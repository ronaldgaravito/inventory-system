<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Productos</title>
    <link rel="stylesheet" th:href="@{/css/styless.css}">

    <style>
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .productos-tabla {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
        }
        
        tbody tr:hover {
            background: #f5f5f5;
        }
        
        .btn-delete {
            padding: 6px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .mensaje {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .mensaje.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">🏪 MiniMarket - Gestión de Productos</div>
    <a href="/admin">⬅️ Volver al Panel</a>
</nav>

<div class="container">
    
    <div id="mensaje" class="mensaje"></div>
    
    <!-- FORMULARIO PARA CREAR PRODUCTO -->
    <div class="form-section">
        <h3>📦 Crear Nuevo Producto</h3>
        <form id="formProducto">
            <div class="form-grid">
                <div class="form-group">
                    <label>ID Producto *</label>
                    <input type="text" id="idProducto" name="idProducto" required maxlength="10" placeholder="Ej: PROD001">
                </div>
                <div class="form-group">
                    <label>Descripción *</label>
                    <input type="text" id="descripcion" name="descripcion" required maxlength="50" placeholder="Nombre del producto">
                </div>
                <div class="form-group">
                    <label>Precio *</label>
                    <input type="number" id="precio" name="precio" required min="0" placeholder="Precio en $">
                </div>
                <div class="form-group">
                    <label>Categoría *</label>
                    <select id="categoria" name="categoria" required style="padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                        <option value="frutas">🍎 Frutas</option>
                        <option value="lacteos">🥛 Lácteos</option>
                        <option value="carnes">🥩 Carnes</option>
                        <option value="panaderia">🍞 Panadería</option>
                        <option value="bebidas">🧃 Bebidas</option>
                        <option value="limpieza">🧹 Limpieza</option>
                        <option value="higiene">🪥 Higiene</option>
                        <option value="granos">🍚 Granos</option>
                        <option value="otros">📦 Otros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Imagen URL (Ruta local o web)</label>
                    <input type="text" id="imagenUrl" name="imagenUrl" placeholder="Ej: /images/ja.jpg o URL de internet">
                </div>
                <div class="form-group">
                    <label>Estado *</label>
                    <input type="text" id="estadoProducto" name="estadoProducto" required maxlength="1" placeholder="A=Activo, I=Inactivo" value="A">
                </div>
            </div>
            <button type="submit" class="btn-primary">✅ Crear Producto</button>
        </form>
    </div>
    
    <!-- SECCIÓN DE BÚSQUEDA -->
    <div class="productos-tabla" style="margin-bottom: 30px;">
        <h3>🔍 Buscar Productos</h3>
        <div class="form-group" style="margin-bottom: 0;">
            <input type="text" id="buscarProducto" placeholder="Busca por ID, descripción o precio..." style="width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #667eea; border-radius: 8px;">
        </div>
    </div>
    
    <!-- TABLA DE PRODUCTOS -->
    <div class="productos-tabla">
        <h3>📋 Lista de Productos</h3>
        <table>
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>ID</th>
                    <th>Categoría</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos">
                <tr>
                    <td colspan="7" style="text-align: center;">Cargando productos...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
</div>

<script>
    const API_URL = '/api/productos';
    
    // Cargar productos al inicio
    document.addEventListener('DOMContentLoaded', () => {
        cargarProductos();
        
        // Agregar evento de búsqueda
        document.getElementById('buscarProducto').addEventListener('input', filtrarProductos);
    });
    
    // Función para cargar todos los productos
    async function cargarProductos() {
        try {
            const response = await fetch(API_URL);
            const productos = await response.json();
            
            const tbody = document.getElementById('tablaProductos');
            
            if (productos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No hay productos registrados</td></tr>';
                return;
            }
            
            tbody.innerHTML = productos.map(p => `
                <tr>
                    <td>
                        <img src="${p.imagenUrl || '/images/default.jpg'}" alt="${p.descripcion}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd;">
                    </td>
                    <td style="font-weight:600;">${p.idProducto}</td>
                    <td><span style="background:#eee; padding:3px 8px; border-radius:5px; font-size:0.85rem;">${p.categoria || 'N/A'}</span></td>
                    <td>${p.descripcion}</td>
                    <td>$${p.precio.toLocaleString()}</td>
                    <td>${p.estadoProducto === 'A' ? '✅ Activo' : '❌ Inactivo'}</td>
                    <td>
                        <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; margin-right: 5px;" onclick="cargarDatosForm('${p.idProducto}', '${p.descripcion}', ${p.precio}, '${p.categoria || 'otros'}', '${p.imagenUrl || ''}', '${p.estadoProducto}')">✏️ Editar</button>
                        <button class="btn-delete" onclick="eliminarProducto('${p.idProducto}')">🗑️ Eliminar</button>
                    </td>
                </tr>
            `).join('');
            
        } catch (error) {
            console.error('Error al cargar productos:', error);
            mostrarMensaje('Error al cargar productos', 'error');
        }
    }

    // Función para precargar datos en el formulario
    function cargarDatosForm(id, desc, precio, cat, img, estado) {
        document.getElementById('idProducto').value = id;
        document.getElementById('idProducto').readOnly = true; // No dejar cambiar el ID al editar
        document.getElementById('descripcion').value = desc;
        document.getElementById('precio').value = precio;
        document.getElementById('categoria').value = cat;
        document.getElementById('imagenUrl').value = img;
        document.getElementById('estadoProducto').value = estado;
        
        // Cambiar texto del botón
        const btn = document.querySelector('#formProducto button[type="submit"]');
        btn.innerHTML = '💾 Guardar Cambios';
        
        // Hacer scroll al formulario
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        mostrarMensaje('Modo edición activado para: ' + id, 'success');
    }

    // Función para limpiar/cancelar edición
    function cancelarEdicion() {
        document.getElementById('formProducto').reset();
        document.getElementById('idProducto').readOnly = false;
        document.getElementById('estadoProducto').value = 'A';
        const btn = document.querySelector('#formProducto button[type="submit"]');
        btn.innerHTML = '✅ Crear Producto';
    }
    
    // Crear o Actualizar producto
    document.getElementById('formProducto').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const producto = {
            idProducto: document.getElementById('idProducto').value.trim(),
            descripcion: document.getElementById('descripcion').value.trim(),
            precio: parseInt(document.getElementById('precio').value),
            categoria: document.getElementById('categoria').value,
            imagenUrl: document.getElementById('imagenUrl').value.trim(),
            estadoProducto: document.getElementById('estadoProducto').value.trim().toUpperCase()
        };
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(producto)
            });
            
            if (response.ok) {
                mostrarMensaje('✅ Proceso realizado exitosamente', 'success');
                cancelarEdicion();
                cargarProductos();
            } else {
                mostrarMensaje('❌ Error al procesar el producto', 'error');
            }
            
        } catch (error) {
            console.error('Error:', error);
            mostrarMensaje('❌ Error de conexión', 'error');
        }
    });
    
    // Eliminar producto
    async function eliminarProducto(id) {
        if (!confirm(`¿Seguro que deseas eliminar el producto ${id}?`)) {
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                mostrarMensaje('✅ Producto eliminado', 'success');
                cargarProductos();
            } else {
                mostrarMensaje('❌ Error al eliminar', 'error');
            }
            
        } catch (error) {
            console.error('Error:', error);
            mostrarMensaje('❌ Error de conexión', 'error');
        }
    }
    
    // Mostrar mensajes
    function mostrarMensaje(texto, tipo) {
        const mensaje = document.getElementById('mensaje');
        mensaje.textContent = texto;
        mensaje.className = `mensaje ${tipo}`;
        mensaje.style.display = 'block';
        
        setTimeout(() => {
            mensaje.style.display = 'none';
        }, 3000);
    }
    
    // Función para filtrar productos en la tabla
    function filtrarProductos() {
        const busqueda = document.getElementById('buscarProducto').value.toLowerCase();
        const filas = document.querySelectorAll('#tablaProductos tr');
        let contadorVisible = 0;
        
        filas.forEach(fila => {
            const texto = fila.textContent.toLowerCase();
            
            if (texto.includes(busqueda)) {
                fila.style.display = '';
                contadorVisible++;
            } else {
                fila.style.display = 'none';
            }
        });
        
        // Si no hay resultados y el usuario escribió algo
        if (contadorVisible === 0 && busqueda.length > 0) {
            const tbody = document.getElementById('tablaProductos');
            // Crear una fila temporal de "no encontrado"
            const filaVacia = document.createElement('tr');
            filaVacia.innerHTML = '<td colspan="5" style="text-align: center; color: #e74c3c; font-weight: bold;">❌ No se encontraron productos que coincidan con la búsqueda</td>';
            
            // Limpiar y agregar
            const filasTotales = tbody.querySelectorAll('tr');
            filasTotales.forEach(f => f.remove());
            tbody.appendChild(filaVacia);
        }
    }
</script>

</body>
</html>
